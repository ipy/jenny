# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on:
  push:
    branches: [ "main" ]
    tags: [ "v*.*.*" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
    permissions:
      contents: write
    env:
      ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.26.1'
        cache: true

    - name: Download dependencies
      run: go mod download

    - name: Install Dependencies (Unix only)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y ripgrep
        git config --global user.name "jenny-ci"
        git config --global user.email "jenny-ci@users.noreply.github.com"

    - name: Test
      run: go test -short ./...

    # Compute the version string once per run, then inject it into every platform build via -ldflags.
    # Source priority:
    #   1. push of a v* tag       -> tag name stripped of leading "v" (e.g. v0.0.1-alpha.103 -> 0.0.1-alpha.103)
    #   2. push to main / PR      -> `git describe --tags --always` so the string carries the nearest tag plus the SHA distance (e.g. v0.0.1-alpha.102-3-g1fddf2b)
    #   3. fallback (no tags yet) -> short SHA, prefixed so it is obvious it is not a tagged release (e.g. dev-1fddf2b)
    - name: Determine version
      if: runner.os == 'Linux'
      id: version
      run: |
        if [[ "${{ github.ref_type }}" == "tag" ]]; then
          # refs/tags/v0.0.1-alpha.103 -> 0.0.1-alpha.103
          VERSION="${GITHUB_REF_NAME#v}"
        else
          # Nearest tag + distance + short SHA, e.g. v0.0.1-alpha.102-3-g1fddf2b
          DESC=$(git describe --tags --always 2>/dev/null || true)
          if [[ "$DESC" == v* ]]; then
            VERSION="${DESC#v}"
          elif [[ -n "$DESC" ]]; then
            # Shallow / brand-new repo: no tags reachable. Prefix so the string is distinguishable from a tagged release.
            VERSION="dev-$DESC"
          else
            VERSION="dev-${GITHUB_SHA::7}"
          fi
        fi
        echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
        echo "Resolved VERSION=$VERSION"

    - name: Build
      if: runner.os == 'Linux'
      env:
        VERSION: ${{ steps.version.outputs.VERSION }}
      run: |
        # Multi-arch builds. LDFLAGS injects constants.Version so every
        # platform's binary reports the same --version / claude_code_version.
        LDFLAGS="-s -w -X github.com/ipy/jenny/internal/constants.Version=${VERSION}"
        platforms=("linux/amd64" "linux/arm64" "darwin/amd64" "darwin/arm64" "windows/amd64")
        for platform in "${platforms[@]}"; do
          platform_split=(${platform//\// })
          GOOS=${platform_split[0]}
          GOARCH=${platform_split[1]}
          output_name="jenny-$GOOS-$GOARCH"
          if [ $GOOS = "windows" ]; then
            output_name+='.exe'
          fi
          echo "Building $output_name (version=$VERSION)..."
          GOOS=$GOOS GOARCH=$GOARCH go build -ldflags="$LDFLAGS" -v -o "$output_name" ./cmd/jenny

          # Apply executable permissions to Unix binaries
          if [ $GOOS != "windows" ]; then
            chmod +x "$output_name"
          fi
        done
        # Sanity check: confirm --version actually picked up the injection.
        ./jenny-linux-amd64 --version

    - name: Upload Release Assets
      if: github.ref_type == 'tag' && runner.os == 'Linux'
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        echo "Uploading assets for release ${{ github.ref_name }}..."
        # Use a retry loop because the release might still be being created by the 'main' workflow run
        for i in {1..10}; do
          if gh release upload ${{ github.ref_name }} jenny-* --clobber; then
            echo "Successfully uploaded assets."
            exit 0
          fi
          echo "Release not found or upload failed, retrying in 10s... ($i/10)"
          sleep 10
        done
        echo "Failed to upload assets after 10 attempts."
        exit 1

    - name: Run Jenny (Pre-release)
      if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && env.ANTHROPIC_AUTH_TOKEN != '' && runner.os == 'Linux' }}
      env:
        ANTHROPIC_AUTH_TOKEN: ${{ env.ANTHROPIC_AUTH_TOKEN }}
        ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
        ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        ./jenny-linux-amd64 --verbose --dangerously-skip-permissions "You are a release assistant.
        1. Check the latest GitHub release version using 'gh release list'.
        2. Determine the next alpha version number (e.g., if latest is v0.1.0, next could be v0.1.1-alpha.1).
        3. Generate a descriptive release title and a clear, easy-to-understand summary of the changes and new features based on the commits since the last release.
        4. Create a GitHub pre-release using 'gh release create' with the generated title and notes for the new version.
           This will automatically create the tag. Use the --prerelease flag.
           Do NOT attach any assets in this step.
        Do not modify any files in the repository."
